spring.application.name=ROUTESPHERE-VEHICLE

server.port=8082

eureka.client.service-url.defaultZone=http://rds:8761/eureka

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/routespheredb
spring.datasource.username=routesphere
spring.datasource.password=Routesphere@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=TRACE

server.forward-headers-strategy=framework